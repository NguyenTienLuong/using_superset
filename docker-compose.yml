services:
  # --- BACKEND (FastAPI) ---
  api:
    build: . # Nó sẽ tự tìm file Dockerfile ở cùng thư mục để build code của bạn
    container_name: aitrans_backend
    command:
      [
        "uvicorn",
        "app.main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8000",
        "--reload",
      ]
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    working_dir: /app
    environment:
      - DATABASE_URL=postgresql://admin:password123@postgres:5432/ai_translator
      - REDIS_URL=redis://redis:6379/0
      # Thêm các API Key của bạn vào đây nếu cần
      - OPENAI_API_KEY=your_key_here
    depends_on:
      - postgres
      - redis
    restart: always

  # --- DATABASE (Postgres) ---
  postgres:
    image: postgres:15-alpine
    container_name: aitrans_postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: ai_translator
    ports:
      - "5432:5432"
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  # --- CACHE (Redis) ---
  redis:
    image: redis:alpine
    container_name: aitrans_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
  drupal_db:
    image: mysql:8

    container_name: drupal_mysql

    environment:
      MYSQL_DATABASE: drupal
      MYSQL_USER: drupal
      MYSQL_PASSWORD: drupal123
      MYSQL_ROOT_PASSWORD: root123

    ports:
      - "3306:3306"

    volumes:
      - drupal_db_data:/var/lib/mysql

    restart: unless-stopped
  drupal:
    image: drupal:11

    container_name: drupal_admin

    ports:
      - "8080:80"

    depends_on:
      - drupal_db

    volumes:
      - ./drupal/modules:/var/www/html/modules
      - ./drupal/themes:/var/www/html/themes

    restart: unless-stopped
volumes:
  postgres_data:
  redis_data:
  drupal_db_data:
